<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CHOOSING FUN TIME HAPPY TIME GAME</title>

<style>
:root{
  --pink:#ff4fa3;
  --pink-soft:#ff9fd0;
  --mint:#a6ffe0;
  --lav:#d6b3ff;
  --yellow:#fff7a6;
  --bg1:#ffe6f7;
  --bg2:#ffd4f2;
  --bg3:#fff0fa;
  --heart:#ff2f92;
  --heart-fill:#ff9fd0;
  --heart-empty:#000000;
  --glow:rgba(255,150,220,0.8);
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  font-family:"Comic Sans MS","Arial Rounded MT Bold",system-ui,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  background-size:300% 300%;
  animation:bgShift 16s infinite alternate ease-in-out;
  color:var(--pink);
  height:100%;
  overflow:hidden;
}

@keyframes bgShift{
  0%{background-position:0% 0%;}
  100%{background-position:100% 100%;}
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  width:100%;
  max-width:420px;
  height:100vh;
  padding:8px 10px 10px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
}

/* Small title above mascot */
.app-title{
  font-size:16px;
  font-weight:900;
  color:white;
  text-shadow:
    0 0 6px var(--pink),
    0 0 10px var(--pink-soft);
  margin-bottom:4px;
  text-align:center;
}

/* Main card container */
.glass{
  background:rgba(255,255,255,0.75);
  border-radius:22px;
  border:3px solid var(--pink-soft);
  box-shadow:0 0 18px var(--glow);
  padding:10px;
  width:100%;
}

/* Setup section */
#setup textarea,
#setup input{
  width:100%;
  padding:8px;
  margin-bottom:6px;
  border-radius:16px;
  border:2px solid var(--pink-soft);
  font-size:13px;
  background:white;
  color:var(--pink);
  box-shadow:0 0 8px var(--glow);
}

button{
  width:100%;
  padding:8px;
  margin:4px 0;
  border-radius:999px;
  border:none;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  color:white;
  text-shadow:0 0 4px rgba(0,0,0,0.3);
  box-shadow:0 0 10px var(--glow);
  transition:transform 0.1s ease;
}
button:active{transform:scale(0.96);}

.btn-primary{background:linear-gradient(135deg,#ff7ac8,#ff4fa3);}
.btn-keep{background:linear-gradient(135deg,#a6ffe0,#5affc7);color:#005533;}
.btn-danger{background:linear-gradient(135deg,#ff6b6b,#ff3b8b);}
.btn-secondary{background:linear-gradient(135deg,#d6b3ff,#b38aff);}

/* Compare layout */
#compare{
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* Speech + mascot row */
.header-row{
  display:flex;
  gap:6px;
  align-items:stretch;
}

/* Speech bubble */
#speechBubble{
  flex:2;
  background:white;
  border-radius:18px;
  border:3px solid var(--pink-soft);
  padding:6px;
  font-size:12px;
  line-height:1.2;
  box-shadow:0 0 10px var(--glow);
  animation:glitch 0.18s steps(2,end) infinite alternate;
}

@keyframes glitch{
  0%{transform:translate(0,0);}
  100%{transform:translate(1px,-1px);}
}

/* Mascot CRT cat-girl */
#robotFace{
  flex:1;
  background:white;
  border-radius:20px;
  border:3px solid var(--pink-soft);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  color:var(--pink);
  position:relative;
  box-shadow:0 0 12px var(--glow);
  animation:crtFlicker 0.12s infinite alternate;
}

@keyframes crtFlicker{
  0%{opacity:0.95;}
  100%{opacity:1;}
}

/* Cat ears */
#robotFace::before,
#robotFace::after{
  content:"";
  position:absolute;
  top:-16px;
  width:22px;
  height:22px;
  background:white;
  border-radius:8px;
  border:3px solid var(--pink-soft);
  transform:rotate(45deg);
  box-shadow:0 0 10px var(--glow);
}
#robotFace::before{left:8px;}
#robotFace::after{right:8px;}

/* Cards row */
.cards-row{
  display:flex;
  gap:6px;
  margin-top:4px;
}

.card{
  flex:1;
  background:white;
  border-radius:18px;
  border:3px solid var(--pink-soft);
  padding:8px;
  font-size:14px;
  text-align:center;
  color:var(--pink);
  box-shadow:0 0 10px var(--glow);
  animation:cardWiggle 2s infinite ease-in-out;
}

@keyframes cardWiggle{
  0%{transform:rotate(-1deg);}
  50%{transform:rotate(1deg);}
  100%{transform:rotate(-1deg);}
}

/* Heart timer between cards row */
.heart-row{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:2px 0 4px;
}

/* Heart shape using two circles + triangle */
.heart-shell{
  width:60px;
  height:54px;
  position:relative;
  filter:drop-shadow(0 0 10px var(--glow));
}
.heart-base{
  position:absolute;
  inset:0;
  background:var(--heart);
  clip-path:path("M30 54 L2 26 A14 14 0 0 1 30 10 A14 14 0 0 1 58 26 Z");
}
.heart-fill{
  position:absolute;
  inset:0;
  background:var(--heart-fill);
  clip-path:path("M30 54 L2 26 A14 14 0 0 1 30 10 A14 14 0 0 1 58 26 Z");
  transform-origin:bottom center;
  transition:transform 0.2s linear, background 0.2s linear;
}

/* Button rows */
.button-row{
  display:flex;
  gap:6px;
  margin-top:2px;
}
.button-row button{flex:1;}

/* Results */
#results{
  font-size:13px;
  line-height:1.3;
}
#results h2{
  font-size:15px;
  margin:6px 0 2px;
  color:var(--pink);
}

/* Floating hearts / stickers (controlled chaos) */
.floating-layer{
  pointer-events:none;
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-1;
}
.floating-heart{
  position:absolute;
  font-size:14px;
  opacity:0.7;
  animation:floatUp 8s linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(100vh) translateX(0);opacity:0;}
  10%{opacity:0.8;}
  90%{opacity:0.8;}
  100%{transform:translateY(-20vh) translateX(0);opacity:0;}
}

.hidden{display:none;}
</style>
</head>

<body>
<div class="app">

  <div class="app-title">CHOOSING FUN TIME HAPPY TIME GAME</div>

  <div id="setup" class="glass">
    <textarea id="items" rows="4" placeholder="Enter items (one per line) for Hollie to choose from 💖"></textarea>
    <input type="number" id="target" placeholder="How many should Hollie keep?">
    <button class="btn-primary" onclick="start()">START THE FUN TIME 💖</button>
  </div>

  <div id="compare" class="glass hidden">
    <div class="header-row">
      <div id="speechBubble">Hi Hollie!! It’s choosing fun time happy time!! 💖✨</div>
      <div id="robotFace">^_^</div>
    </div>

    <div class="cards-row">
      <div class="card" id="cardA"></div>
      <div class="card" id="cardB"></div>
    </div>

    <div class="heart-row">
      <div class="heart-shell">
        <div class="heart-base"></div>
        <div class="heart-fill" id="heartFill"></div>
      </div>
    </div>

    <div class="button-row">
      <button class="btn-primary" onclick="choose('A')">CHOOSE A</button>
      <button class="btn-primary" onclick="choose('B')">CHOOSE B</button>
    </div>

    <div class="button-row">
      <button class="btn-keep" onclick="forceKeep('A')">KEEP A</button>
      <button class="btn-keep" onclick="forceKeep('B')">KEEP B</button>
    </div>

    <div class="button-row">
      <button class="btn-danger" onclick="forceDiscard('A')">DISCARD A</button>
      <button class="btn-danger" onclick="forceDiscard('B')">DISCARD B</button>
    </div>

    <div class="button-row">
      <button class="btn-secondary" onclick="goBack()">BACK</button>
      <button class="btn-secondary" onclick="resetAll()">RESET</button>
    </div>
  </div>

  <div id="results" class="glass hidden"></div>
</div>

<!-- Floating hearts / stickers layer -->
<div class="floating-layer" id="floatingLayer"></div>

<script>
let items=[],target=0;
let stack=[],left=[],right=[],merged=[];
let history=[],keepForced=[],discardForced=[];
let timer=null;
let timeLeft=30;

const faces=["^_^","UwU",">w<","OwO","*_*","x_x","≧◡≦","(✿◠‿◠)"];

const snark={
  start:[
    "Hi Hollie!! I’m your chaos kitty!! Let’s make sparkly choices!! 💖✨",
    "Hollieee~ it’s time for CHOOSING FUN TIME HAPPY TIME!! 🌈💖",
    "Yaaay Hollie pressed start!! I’m so proud and slightly unhinged!! 💕"
  ],
  choose:[
    "Nice choice, Hollie!! I support your beautiful chaos!! 💖",
    "Sparkle decision!! You’re doing amazing, sweetie!! ✨",
    "That one?? ICONIC. I love your brain. 💕"
  ],
  keep:[
    "Keeping it?? Awwww, Hollie loves this one!! 💖",
    "YES, KEEP IT!! Emotional attachment is valid and sparkly!! ✨",
    "We’re keeping this one FOREVER (or until next declutter) 💕"
  ],
  discard:[
    "BYE‑BYE!! Into the sparkly void it goes!! 💖🗑️",
    "Yeet!! Hollie has spoken!! ✨",
    "We release it with love and glitter!! 💕"
  ],
  timeout:[
    "Eeeek!! Time’s up, Hollie!! I panicked and threw both away!! 💖🔥",
    "Oops!! The heart went empty… they both fell into the void!! ✨💀"
  ],
  back:[
    "Undo time!! We rewind the sparkles for you, Hollie!! 💖",
    "Reversing reality just for you!! ✨"
  ],
  finish:[
    "We did it, Hollie!! CHOOSING FUN TIME SUCCESS!! 💖🌈",
    "All done!! Look at your beautiful choices!! 💕"
  ]
};

function setSnark(type){
  const bubble=document.getElementById("speechBubble");
  const arr=snark[type];
  bubble.textContent=arr[Math.floor(Math.random()*arr.length)];
  document.getElementById("robotFace").textContent=
    faces[Math.floor(Math.random()*faces.length)];
}

/* Sounds */
const beep=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const panic=new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");
const explode=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

function startTimer(){
  timeLeft=30;
  updateHeart();
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft-=1;
    updateHeart();
    if(timeLeft>0) beep.play().catch(()=>{});

    if(timeLeft===5){
      panic.play().catch(()=>{});
    }

    if(timeLeft<=0){
      clearInterval(timer);
      explode.play().catch(()=>{});
      autoDiscard();
    }
  },1000);
}

function updateHeart(){
  const fill=document.getElementById("heartFill");
  const pct=Math.max(timeLeft/30,0);
  if(pct>0){
    fill.style.transform="scaleY("+pct+")";
    fill.style.background= "var(--heart-fill)";
  }else{
    fill.style.transform="scaleY(0.01)";
    fill.style.background= "var(--heart-empty)";
  }
}

/* Floating hearts / stickers */
function spawnFloating(){
  const layer=document.getElementById("floatingLayer");
  const el=document.createElement("div");
  el.className="floating-heart";
  const emojis=["💖","✨","💗","🌈","⭐","💕"];
  el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  el.style.left=Math.random()*100+"vw";
  el.style.animationDuration=(6+Math.random()*4)+"s";
  layer.appendChild(el);
  setTimeout(()=>layer.removeChild(el),10000);
}
setInterval(spawnFloating,1200);

function start(){
  items=document.getElementById("items").value.split("\n").map(x=>x.trim()).filter(Boolean);
  target=parseInt(document.getElementById("target").value);
  if(!items.length||!target||target>items.length){
    alert("Check the list and target for Hollie 💖");
    return;
  }
  stack=items.map(i=>[i]);
  history=[];keepForced=[];discardForced=[];
  document.getElementById("setup").classList.add("hidden");
  document.getElementById("compare").classList.remove("hidden");
  setSnark("start");
  nextMerge();
}

function nextMerge(){
  if(stack.length===1){finish();return;}
  left=stack.shift();
  right=stack.shift();
  merged=[];
  show();
}

function show(){
  if(!left.length){
    stack.push(merged.concat(right));
    nextMerge();
    return;
  }
  if(!right.length){
    stack.push(merged.concat(left));
    nextMerge();
    return;
  }
  document.getElementById("cardA").innerText=left[0];
  document.getElementById("cardB").innerText=right[0];
  startTimer();
}

function choose(side){
  history.push({left:[...left],right:[...right],merged:[...merged],stack:[...stack]});
  if(side==="A") merged.push(left.shift());
  else merged.push(right.shift());
  setSnark("choose");
  show();
}

function forceKeep(side){
  if(side==="A") keepForced.push(left.shift());
  else keepForced.push(right.shift());
  setSnark("keep");
  show();
}

function forceDiscard(side){
  if(side==="A") discardForced.push(left.shift());
  else discardForced.push(right.shift());
  setSnark("discard");
  show();
}

function autoDiscard(){
  setSnark("timeout");
  if(left.length) discardForced.push(left.shift());
  if(right.length) discardForced.push(right.shift());
  show();
}

function goBack(){
  if(!history.length)return;
  const prev=history.pop();
  left=prev.left;
  right=prev.right;
  merged=prev.merged;
  stack=prev.stack;
  setSnark("back");
  show();
}

function finish(){
  clearInterval(timer);
  let ranked=stack[0];
  ranked=keepForced.concat(ranked.filter(x=>!keepForced.includes(x)));
  ranked=ranked.filter(x=>!discardForced.includes(x));

  let keep=ranked.slice(0,target);
  let discard=ranked.slice(target).concat(discardForced);

  function format(list){
    return list.map(i=>`<div>• ${i}</div>`).join("");
  }

  document.getElementById("compare").classList.add("hidden");
  const res=document.getElementById("results");
  res.classList.remove("hidden");
  res.innerHTML=
    "<h2>Hollie keeps 💖</h2>"+format(keep)+
    "<h2>Released with glitter ✨</h2>"+format(discard)+
    "<br><button class='btn-primary' onclick='resetAll()'>PLAY AGAIN</button>";
  setSnark("finish");
}

function resetAll(){location.reload();}
</script>
</body>
</html>
